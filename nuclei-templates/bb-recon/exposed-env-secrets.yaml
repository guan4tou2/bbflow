id: bb-exposed-env-secrets

info:
  name: Exposed .env / Config Files with Credentials
  author: guan4tou2
  severity: high
  description: |
    Detects publicly accessible .env, config, and credential files.
    Directly exploitable: contains plaintext API keys, DB passwords, JWT secrets.
  tags: bb-recon,exposure,secrets,credentials

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.prod"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.bak"
      - "{{BaseURL}}/config/.env"
      - "{{BaseURL}}/api/.env"
      - "{{BaseURL}}/.env.example"
      - "{{BaseURL}}/config/database.yml"
      - "{{BaseURL}}/config/secrets.yml"
      - "{{BaseURL}}/application.properties"
      - "{{BaseURL}}/application.yml"
      - "{{BaseURL}}/WEB-INF/web.xml"
      - "{{BaseURL}}/wp-config.php.bak"
      - "{{BaseURL}}/wp-config.php~"

    stop-at-first-match: false
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        condition: or
        regex:
          - '(?i)(DB_PASSWORD|DATABASE_PASSWORD|MYSQL_PASSWORD|POSTGRES_PASSWORD)\s*=\s*\S+'
          - '(?i)(API_KEY|API_SECRET|SECRET_KEY|APP_SECRET|JWT_SECRET)\s*=\s*\S+'
          - '(?i)(AWS_SECRET|AWS_ACCESS_KEY|S3_SECRET)\s*=\s*\S+'
          - '(?i)(STRIPE_SECRET|PAYPAL_SECRET|TWILIO_AUTH)\s*=\s*\S+'
          - '(?i)(REDIS_PASSWORD|MONGODB_URI|DATABASE_URL)\s*=\s*\S+'
          - '(?i)password\s*=\s*[^\s\$\{]+'
        part: body

    extractors:
      - type: regex
        name: leaked_vars
        regex:
          - '(?i)((?:API|SECRET|PASSWORD|KEY|TOKEN|AUTH)[_A-Z]*)\s*=\s*([^\s\n]+)'
        part: body
